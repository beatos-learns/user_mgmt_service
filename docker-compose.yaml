# docker-compose.yaml | user service + PostgreSQL behind a Traefik reverse proxy.
#
# App config from .env (compose auto-loads it for ${...} interpolation)
#
# Images are built and pushed by CI (.github/workflows/deploy.yaml — zstd
# "baked" layers via docker-bake.hcl); the deploy points IMAGE_NAME/IMAGE_TAG
# at them through .env. Compose can still build runtime-identical images
# itself (gzip layers [bigger image]):
#   docker compose up -d --build
#
# Access (TLS terminated at Traefik; HTTP is redirected to HTTPS):
#   https://localhost/api/users/...        -> backend (self-signed cert locally; test with an HTTP
#                                             client that ignores cert verification, e.g. Postman)
#   http://localhost/api/users/...         -> 301 redirect to the HTTPS URL above
#   https://api.docker.localhost           -> backend, used by the frontend's browser-side calls
#   https://auth.docker.localhost          -> Next.js auth portal
#   https://auth.niichan.ch/api/users/...  -> backend (public, Let's Encrypt TLS)
#   https://auth.niichan.ch                -> Next.js auth portal (public, Let's Encrypt TLS),
#                                             including its own /api/login|me|logout route handlers
#   https://dashboard.niichan.ch           -> Traefik dashboard (basic-auth, Let's Encrypt TLS)
# The database has no published ports and is only reachable on the internal network.
name: user-mgmt

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - user-mgmt-net
    # Credentials mirror .env (SPRING_DATASOURCE_*), so the app and DB agree.
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # The service start is gated on this becoming healthy.
    # -h 127.0.0.1 forces TCP: without it pg_isready hits the unix socket, which
    # already answers during initdb's temporary bootstrap server on a fresh volume.
    # start_interval (fast probing during start_period) needs Docker Engine 25+.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d postgres"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 30s
      start_interval: 2s
    # Uncomment to reach the DB from the host for debugging:
    # ports:
    #   - "5432:5432"

  traefik:
    image: traefik:v3.7.5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    # The alias lets containers on this network (the frontend's server-side
    # login proxy) resolve auth.niichan.ch straight to Traefik via Docker's
    # embedded DNS instead of hairpinning through the VM's public IP; Traefik
    # serves the real Let's Encrypt cert by SNI, so TLS validation still passes.
    networks:
      user-mgmt-net:
        aliases:
          - auth.niichan.ch

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Docker provider needs read-only access to the daemon socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persists acme.json (Let's Encrypt account + issued certs).
      - traefik-cert:/certs

    command:
      # EntryPoints: HTTP (80) and HTTPS (443). All HTTP traffic is permanently
      # redirected to HTTPS (the ACME HTTP-01 challenge on /.well-known/ is served
      # before the redirect, so certificate issuance still works).
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"

      # Docker provider — nothing is routed unless it opts in with traefik.enable=true
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Let's Encrypt (ACME) via HTTP-01 challenge on the web entrypoint
      - "--certificatesresolvers.le.acme.email=samuel.ramseier1994@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"

      # API & Dashboard — secured, exposed only through the router below
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

      # Ping endpoint for the healthcheck (internal "traefik" entrypoint :8080, not published)
      - "--ping=true"

    # `traefik healthcheck` parses the flags it is given and probes its own
    # /ping endpoint, so --ping is needed both here and in `command`.
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s

    # Traefik Dynamic configuration via Docker labels
    labels:
      - "traefik.enable=true"

      # Dashboard router — public host, real TLS cert, basic-auth protected
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.niichan.ch`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"

      # Basic-auth middleware (user: bos-admin). Hash lives in .env; $ is escaped as $$.
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  # Whoami application
  whoami:
    # Stock traefik/whoami is FROM scratch (just the whoami binary, no shell),
    # so it cannot exec a healthcheck. Extend it with a static busybox so the
    # healthcheck below can wget-probe the app.
    build:
      context: .
      dockerfile_inline: |
        FROM traefik/whoami:v1.11.0
        COPY --from=busybox:1.36.1-musl /bin/busybox /busybox
    # Build-only service: rebuild on every `up` so base-image bumps in
    # dockerfile_inline aren't silently ignored (the build is fully cached).
    pull_policy: build
    container_name: whoami
    restart: unless-stopped
    networks:
      - user-mgmt-net
    # Probe the immutable /api endpoint — /health is whoami's failure-simulation
    # knob (any peer can POST a 503 there) and would make health spoofable.
    healthcheck:
      test: ["CMD", "/busybox", "wget", "-q", "-O", "-", "http://127.0.0.1:80/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 2s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.docker.localhost`)"
      - "traefik.http.routers.whoami.entrypoints=websecure"
      - "traefik.http.routers.whoami.tls=true"


  user-service:
    # The baked image: CI (docker-bake.hcl) tags it :<version> and :latest.
    image: ${IMAGE_NAME:-user-mgmt-service}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - user-mgmt-net
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_NAME: ${IMAGE_NAME:-user-mgmt-service}
        VERSION: ${VERSION:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    # All app config from the .env
    env_file:
      - .env
    # override the datasource host: localhost to the `postgres` service on the compose network.
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
    # /healthcheck is a tiny C probe baked into the image (Dockerfile +
    # build-helper/healthcheck.c) since distroless has no shell/curl. Healthy =
    # the app answers HTTP < 500 on :8080 (no actuator; 403 proves liveness).
    healthcheck:
      test: ["CMD", "/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 1s
    # Exposed through Traefik (HTTPS) so the frontend's browser-side API calls
    # have a reachable target; no host port needed.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.user-service.rule=Host(`api.docker.localhost`)"
      - "traefik.http.routers.user-service.entrypoints=websecure"
      - "traefik.http.routers.user-service.tls=true"
      - "traefik.http.services.user-service.loadbalancer.server.port=8080"

      # Strip the /api prefix so /api/users/me reaches the app as /users/me.
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"

      # Local/default route: https://localhost/api/users/... — HTTPS only, TLS
      # terminated by Traefik (Aufgabe 3+4). localhost gets Traefik's default
      # self-signed cert (Let's Encrypt cannot issue for localhost). Host-scoped
      # routers above/below outrank this path-only rule, so *.docker.localhost
      # traffic is unaffected.
      # Scoped to /api/users (the backend's entire HTTP surface) — a bare /api
      # prefix would also capture the portal's own Next.js routes
      # (/api/login|me|logout), which must reach the frontend. Don't re-widen.
      - "traefik.http.routers.api.rule=PathPrefix(`/api/users`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.middlewares=api-strip"

      # Public route: https://auth.niichan.ch/api/users/... with a real Let's
      # Encrypt cert. Same /api/users scoping as above: /api/login|me|logout are
      # the portal's Next.js route handlers and must fall through to it.
      - "traefik.http.routers.api-secure.rule=Host(`auth.niichan.ch`) && PathPrefix(`/api/users`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.tls.certresolver=le"
      - "traefik.http.routers.api-secure.middlewares=api-strip"

  # Next.js auth portal (https://github.com/yagan93/auth_portal), served via
  # Traefik at https://auth.docker.localhost. The Dockerfile pulls the source
  # from GitHub, so nothing needs to be cloned locally.
  frontend:
    image: ${FRONTEND_IMAGE_NAME:-auth-portal}:${FRONTEND_IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - user-mgmt-net
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time; rebuild to change it.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.docker.localhost}
    # Gate on the backend actually serving (healthcheck above), not just created.
    depends_on:
      user-service:
        condition: service_healthy
    # The distroless runtime has no shell/curl, but it does have node itself,
    # so the probe is an inline fetch. Healthy = the Next.js server answers
    # HTTP < 500 on :3000 (PORT comes from the image env).
    healthcheck:
      test: ["CMD", "/nodejs/bin/node", "-e", "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/').then(r=>process.exit(r.status<500?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
      start_interval: 2s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`auth.docker.localhost`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

      # Public route: https://auth.niichan.ch with a real Let's Encrypt cert.
      # The api-secure router above outranks this host-only rule (longer rule =
      # higher priority) for /api/users paths only, so backend calls reach
      # Spring while everything else — including the portal's own Next.js
      # /api/login|me|logout handlers — lands here.
      - "traefik.http.routers.frontend-secure.rule=Host(`auth.niichan.ch`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.tls=true"
      - "traefik.http.routers.frontend-secure.tls.certresolver=le"

networks:
  user-mgmt-net:
    driver: bridge

volumes:
  postgres-data:
  traefik-cert:
