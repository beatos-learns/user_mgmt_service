# docker-compose.yaml | user service + PostgreSQL behind a Traefik reverse proxy.
#
# App config from .env (compose auto-loads it for ${...} interpolation)
#
# Recommended flow gets the zstd "baked" image (Gradle version + :latest):
#   .\build-image.ps1            # build the baked image first
#   docker compose up -d         # start DB, then the service once the DB is healthy
# Or let compose build it itself (runtime-identical, gzip layers [bigger Image]):
#   docker compose up -d --build
#
# Access:
#   http://localhost:80/api/...            -> backend (assignment requirement, plaintext loopback)
#   https://auth.niichan.ch/api/...        -> backend (public, Let's Encrypt TLS)
#   https://dashboard.niichan.ch           -> Traefik dashboard (basic-auth, Let's Encrypt TLS)
# The database has no published ports and is only reachable on the internal network.
name: user-mgmt

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - user-mgmt-net
    # Credentials mirror .env (SPRING_DATASOURCE_*), so the app and DB agree.
    environment:
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # The service start is gated on this becoming healthy.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATASOURCE_USERNAME:-postgres} -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    # No ports: the DB is never exposed to the host, only reachable in-network.

  traefik:
    image: traefik:v3.7.5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

    networks:
      - user-mgmt-net

    ports:
      - "80:80"
      - "443:443"

    volumes:
      # Docker provider needs read-only access to the daemon socket.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persists acme.json (Let's Encrypt account + issued certs).
      - traefik-cert:/certs

    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Docker provider — nothing is routed unless it opts in with traefik.enable=true
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"

      # Let's Encrypt (ACME) via HTTP-01 challenge on the web entrypoint
      - "--certificatesresolvers.le.acme.email=samuel.ramseier1994@gmail.com"
      - "--certificatesresolvers.le.acme.storage=/certs/acme.json"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"

      # API & Dashboard — secured, exposed only through the router below
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Observability
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

    # Dashboard routing + auth via Docker labels
    labels:
      - "traefik.enable=true"

      # Dashboard router — public host, real TLS cert, basic-auth protected
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.niichan.ch`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"

      # Basic-auth middleware (user: bos-admin). Hash lives in .env; $ is escaped as $$.
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"

  user-service:
    # The baked image: build-image.ps1 / docker-bake.hcl tag it :<version> and :latest.
    image: ${IMAGE_NAME:-user-mgmt-service}:${IMAGE_TAG:-latest}
    networks:
      - user-mgmt-net
    build:
      context: .
      dockerfile: Dockerfile
      args:
        IMAGE_NAME: ${IMAGE_NAME:-user-mgmt-service}
        VERSION: ${VERSION:-dev}
    depends_on:
      postgres:
        condition: service_healthy
    # All app config from the .env
    env_file:
      - .env
    # override the datasource host: localhost to the `postgres` service on the compose network.
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
    # No ports: the backend is reachable only through Traefik, never directly.
    labels:
      - "traefik.enable=true"

      # Backend listens on 8080 inside the container.
      - "traefik.http.services.user-service.loadbalancer.server.port=8080"

      # Strip the /api prefix so /api/users/me reaches the app as /users/me.
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"

      # Assignment route: http://localhost:80/api/... (plaintext, loopback demo)
      - "traefik.http.routers.api-web.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api-web.entrypoints=web"
      - "traefik.http.routers.api-web.middlewares=api-strip"

      # Public route: https://auth.niichan.ch/api/... (Let's Encrypt TLS)
      - "traefik.http.routers.api-secure.rule=Host(`auth.niichan.ch`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-secure.entrypoints=websecure"
      - "traefik.http.routers.api-secure.tls=true"
      - "traefik.http.routers.api-secure.tls.certresolver=le"
      - "traefik.http.routers.api-secure.middlewares=api-strip"

networks:
  user-mgmt-net:
    driver: bridge

volumes:
  postgres-data:
  traefik-cert:
